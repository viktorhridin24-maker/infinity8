<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity8 AI - Powered by Firebase</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-color: #010409;
            --text-color: #e6edf3;
            --accent-glow: #58a6ff;
            --input-bg: #161b22;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .glow-active {
            box-shadow: inset 0 0 30px var(--accent-glow);
            transition: box-shadow 0.4s ease-in-out;
        }

        .container {
            display: flex; height: 100vh;
            border: 2px solid transparent;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-color);
            display: flex; flex-direction: column;
            padding: 15px; border-right: 1px solid #30363d;
        }

        .logo-area {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
        }

        .logo-area img {
            width: 40px; height: 40px; border-radius: 50%;
        }

        .new-chat-btn {
            background: #21262d; color: white; border: 1px solid #30363d;
            padding: 12px; border-radius: 8px; cursor: pointer;
            width: 100%; text-align: left; transition: 0.3s;
        }

        .new-chat-btn:hover { background: #30363d; }

        .chat-history { flex-grow: 1; overflow-y: auto; margin-top: 20px; }

        .history-item {
            padding: 10px; font-size: 14px; border-radius: 5px;
            cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .history-item:hover { background: #161b22; }

        /* Chat Area */
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        .chat-messages {
            flex-grow: 1; padding: 20px 15%; overflow-y: auto;
            display: flex; flex-direction: column; gap: 25px;
        }

        .message { max-width: 850px; margin-bottom: 10px; }
        .message.user { color: #8b949e; }
        .message.ai { border-left: 2px solid var(--accent-glow); padding-left: 15px; }

        .input-wrapper {
            padding: 20px 15% 40px 15%;
            background: linear-gradient(transparent, var(--bg-color) 20%);
        }

        .input-area {
            background-color: var(--input-bg);
            border: 1px solid #444c56; border-radius: 12px;
            padding: 12px 20px; display: flex; align-items: center; gap: 15px;
        }

        input {
            background: transparent; border: none; color: white;
            flex-grow: 1; outline: none; font-size: 16px;
        }

        .controls i { color: #8b949e; cursor: pointer; transition: 0.2s; }
        .controls i:hover { color: var(--accent-glow); }
    </style>
</head>
<body>

    <div class="container" id="appContainer">
        <div class="sidebar">
            <div class="logo-area">
                <img src="инфинити 8 ии.png" alt="Infinity8 Logo">
                <span style="font-weight: bold; font-size: 20px;">Infinity8</span>
            </div>
            <button class="new-chat-btn" onclick="startNewChat()">
                <i class="fas fa-plus"></i> Новый чат
            </button>
            <div class="chat-history" id="historyList"></div>
            
            <div style="margin-top: auto; font-size: 13px;">
                <a href="https://codelium.com/" target="_blank" style="color: #58a6ff; text-decoration: none;">
                    <i class="fas fa-terminal"></i> Codelium AI Engine
                </a>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-messages" id="chatBox">
                <!-- Сообщения будут здесь -->
            </div>

            <div class="input-wrapper">
                <div class="input-area">
                    <input type="text" id="userInput" placeholder="Сообщение для Infinity8...">
                    <div class="controls">
                        <i class="fas fa-magic" title="Codelium Optimization"></i>
                        <i class="fas fa-camera" title="Generate Image"></i>
                        <i class="fas fa-paper-plane" id="sendBtn"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQiUup4Sr3QSDEJ0Ql9_LgkrmLDX7S2X8",
            authDomain: "infinityeight-1702c.firebaseapp.com",
            projectId: "infinityeight-1702c",
            storageBucket: "infinityeight-1702c.firebasestorage.app",
            messagingSenderId: "275832051861",
            appId: "1:275832051861:web:0d72848a1e688a0640239c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const chatBox = document.getElementById('chatBox');
        const historyList = document.getElementById('historyList');

        // Функция отправки сообщения в Firebase
        async function sendMessage() {
            const text = document.getElementById('userInput').value;
            if (!text.trim()) return;

            document.getElementById('userInput').value = "";

            try {
                await addDoc(collection(db, "messages"), {
                    text: text,
                    sender: "user",
                    timestamp: serverTimestamp()
                });
                
                // Имитация ответа ИИ
                setTimeout(async () => {
                    await addDoc(collection(db, "messages"), {
                        text: "Я получил твой запрос. Интегрирую Codelium для анализа...",
                        sender: "ai",
                        timestamp: serverTimestamp()
                    });
                }, 1000);

            } catch (e) {
                console.error("Ошибка Firebase: ", e);
            }
        }

        // Слушатель сообщений в реальном времени
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            chatBox.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = `message ${data.sender}`;
                div.innerHTML = `<strong>${data.sender === 'user' ? 'Вы' : 'Infinity8'}</strong><p>${data.text}</p>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        window.startNewChat = () => {
            const container = document.getElementById('appContainer');
            container.classList.add('glow-active');
            setTimeout(() => container.classList.remove('glow-active'), 1500);
            chatBox.innerHTML = '<div class="message ai"><strong>Infinity8</strong><p>Контекст очищен. Начнем заново!</p></div>';
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
